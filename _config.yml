title: -Hacker-
description: "A Jekyll Blog Theme For Hackers"
author:
  name: "D4rk"
  email: "Puls3D4rk@gmail.com"
  url: "https://github.com/gabribn99"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "D4rk"
year : "2021"
